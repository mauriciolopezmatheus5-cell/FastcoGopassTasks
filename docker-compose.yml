# docker-compose.yml — Entorno de desarrollo local GopassTasks
# Replica el ecosistema de AWS ECS con todos los servicios necesarios.

name: gopasstasks

services:

  # ── Base de datos PostgreSQL ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gopasstasks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gopasstasks}
      POSTGRES_USER: ${POSTGRES_USER:-gopass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gopass_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gopasstasks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gopass} -d ${POSTGRES_DB:-gopasstasks}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis Cache ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gopasstasks-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gopasstasks-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API NestJS ──────────────────────────────────────────────────
  api:
    build:
      context: ./gopasstasks-api
      dockerfile: Dockerfile.dev
    container_name: gopasstasks-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-gopass}:${POSTGRES_PASSWORD:-gopass_secret}@postgres:5432/${POSTGRES_DB:-gopasstasks}
      JWT_SECRET: ${JWT_SECRET:-local_dev_jwt_secret_32_chars_min!}
      JWT_EXPIRATION: 3600
      FRONTEND_URL: http://localhost:5173
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "3000:3000"
    volumes:
      # Hot reload: montar código fuente del host en el contenedor
      - ./gopasstasks-api/src:/app/src
      - ./gopasstasks-api/prisma:/app/prisma
      - ./gopasstasks-api/tsconfig.json:/app/tsconfig.json
      - ./gopasstasks-api/tsconfig.build.json:/app/tsconfig.build.json
      - ./gopasstasks-api/nest-cli.json:/app/nest-cli.json
      # Evitar sobreescribir node_modules del contenedor con el del host
      - /app/node_modules
    networks:
      - gopasstasks-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Frontend React + Vite ───────────────────────────────────────
  web:
    build:
      context: ./gopasstasks-web
      dockerfile: Dockerfile.dev
    container_name: gopasstasks-web
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      # Hot reload: montar código fuente del host
      - ./gopasstasks-web/src:/app/src
      - ./gopasstasks-web/public:/app/public
      - ./gopasstasks-web/tailwind.config.js:/app/tailwind.config.js
      - ./gopasstasks-web/postcss.config.js:/app/postcss.config.js
      - ./gopasstasks-web/vite.config.ts:/app/vite.config.ts
      - ./gopasstasks-web/tsconfig.json:/app/tsconfig.json
      # Evitar sobreescribir node_modules
      - /app/node_modules
    networks:
      - gopasstasks-network
    depends_on:
      api:
        condition: service_healthy

# ── Volúmenes persistentes ──────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Red interna (comunicación entre contenedores por nombre) ─────
networks:
  gopasstasks-network:
    driver: bridge
